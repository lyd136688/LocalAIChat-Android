name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Build libllama.so from source
        run: |
          # 创建jniLibs目录结构
          mkdir -p app/src/main/jniLibs/arm64-v8a

          # 克隆llama.cpp源码（指定稳定分支，避免最新版兼容性问题）
          git clone --depth 1 --branch b3700 https://github.com/ggerganov/llama.cpp.git
          cd llama.cpp

          # 编译arm64-v8a架构（仅构建核心库，禁用所有额外工具）
          mkdir -p build-android-arm64-v8a
          cd build-android-arm64-v8a
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_OPENMP=OFF \
            -DGGML_OPENBLAS=OFF \
            -DGGML_LLAMAFILE=OFF \
            -DGGML_NEON=ON \
            -DGGML_FP16=ON \
            -DGGML_FMA=ON \
            # 关键：禁用额外工具，避免posix_spawn错误
            -DLLAMA_BUILD_SERVER=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_BENCHMARKS=OFF
          make -j$(nproc)
          cp libllama.so ../../app/src/main/jniLibs/arm64-v8a/
          cd ../..

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Complete job
        run: echo "Build completed successfully"

