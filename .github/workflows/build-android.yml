name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Build libllama.so from source
        run: |
          # 创建jniLibs目录结构
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a

          # 克隆llama.cpp源码
          git clone https://github.com/ggerganov/llama.cpp.git
          cd llama.cpp

          # 编译arm64-v8a架构（天玑9300+专属优化）
          mkdir -p build-android-arm64-v8a
          cd build-android-arm64-v8a
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_OPENMP=OFF \
            -DGGML_OPENBLAS=OFF \
            -DGGML_LLAMAFILE=OFF \
            # 天玑9300+ ARMv9架构优化
            -DGGML_ARM_V9=ON \
            -DGGML_NEON=ON \
            -DGGML_FP16=ON \
            -DGGML_FMA=ON \
            # 开启NPU/QNN硬件加速
            -DGGML_QNN=ON
          make -j$(nproc)
          cp libllama.so ../../app/src/main/jniLibs/arm64-v8a/
          cd ..

          # 编译armeabi-v7a架构（兼容旧设备，可选）
          mkdir -p build-android-armeabi-v7a
          cd build-android-armeabi-v7a
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-24 \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_OPENMP=OFF \
            -DGGML_OPENBLAS=OFF \
            -DGGML_LLAMAFILE=OFF
          make -j$(nproc)
          cp libllama.so ../../app/src/main/jniLibs/armeabi-v7a/
          cd ../..

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Post Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Post Checkout code
        uses: actions/checkout@v4

      - name: Complete job
        run: echo "Build completed successfully"

