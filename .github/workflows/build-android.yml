name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Download libllama.so for all Android architectures
      run: |
        # 创建jniLibs目录结构
        mkdir -p app/src/main/jniLibs/arm64-v8a
        mkdir -p app/src/main/jniLibs/armeabi-v7a
        mkdir -p app/src/main/jniLibs/x86_64

        # 获取llama.cpp最新版本号
        echo "正在获取llama.cpp最新版本号..."
        LATEST_VERSION=$(curl -s --retry 3 --retry-delay 2 https://api.github.com/repos/ggml-org/llama.cpp/releases/latest | grep -o '"tag_name": ".*"' | cut -d'"' -f4)

        if [ -z "$LATEST_VERSION" ]; then
          echo "错误：无法获取llama.cpp最新版本号"
          exit 1
        fi

        echo "llama.cpp最新版本: $LATEST_VERSION"

        # 定义需要下载的架构列表
        ARCHITECTURES=("arm64-v8a" "armeabi-v7a" "x86_64")

        # 循环下载每个架构的库文件
        for ARCH in "${ARCHITECTURES[@]}"; do
          echo "正在下载 $ARCH 架构的libllama.so..."

          # 先尝试新的tar.xz格式（b9437及以后版本）
          DOWNLOAD_URL="https://github.com/ggml-org/llama.cpp/releases/download/${LATEST_VERSION}/llama-${LATEST_VERSION}-android-${ARCH}.tar.xz"
          FILE_EXT="tar.xz"

          # 检查文件是否存在
          if curl -s --head --fail "$DOWNLOAD_URL" > /dev/null; then
            echo "使用新格式: tar.xz"
          else
            # 如果不存在，尝试旧的zip格式
            DOWNLOAD_URL="https://github.com/ggml-org/llama.cpp/releases/download/${LATEST_VERSION}/llama-${LATEST_VERSION}-android-${ARCH}.zip"
            FILE_EXT="zip"
            echo "使用旧格式: zip"
          fi

          # 下载文件
          if curl -L --retry 3 --retry-delay 2 -o "llama-${ARCH}.${FILE_EXT}" "$DOWNLOAD_URL"; then
            # 根据文件格式选择解压命令
            if [ "$FILE_EXT" = "tar.xz" ]; then
              tar -xf "llama-${ARCH}.tar.xz"
            else
              unzip -o "llama-${ARCH}.zip" -d "llama-${ARCH}"
            fi

            # 复制libllama.so到正确的jniLibs目录
            # 检查两种可能的目录结构
            if [ -f "libllama.so" ]; then
              cp libllama.so "app/src/main/jniLibs/${ARCH}/"
            elif [ -f "llama-${ARCH}/libllama.so" ]; then
              cp "llama-${ARCH}/libllama.so" "app/src/main/jniLibs/${ARCH}/"
            else
              echo "❌ 错误：在解压后的文件中找不到libllama.so"
              exit 1
            fi

            # 清理临时文件
            rm -rf "llama-${ARCH}.${FILE_EXT}" "llama-${ARCH}" libllama.so
            echo "✅ $ARCH 架构下载并安装成功"
          else
            echo "❌ 错误：无法下载 $ARCH 架构的libllama.so"
            echo "下载链接: $DOWNLOAD_URL"
            exit 1
          fi
        done

        echo "所有架构的libllama.so下载完成"

    - name: Generate Gradle Wrapper
      run: gradle wrapper

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LocalAI-Chat-Android-debug
        path: app/build/outputs/apk/debug/app-debug.apk

