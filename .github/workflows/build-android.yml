name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Download libllama.so for all Android architectures
      run: |
        # 创建jniLibs目录结构
        mkdir -p app/src/main/jniLibs/arm64-v8a
        mkdir -p app/src/main/jniLibs/armeabi-v7a
        mkdir -p app/src/main/jniLibs/x86_64

        # 获取llama.cpp最新版本号
        echo "正在获取llama.cpp最新版本号..."
        LATEST_VERSION=$(curl -sL --retry 3 --retry-delay 2 https://api.github.com/repos/ggml-org/llama.cpp/releases/latest | grep -o '"tag_name": ".*"' | cut -d'"' -f4)

        if [ -z "$LATEST_VERSION" ]; then
          echo "错误：无法获取llama.cpp最新版本号"
          exit 1
        fi

        echo "llama.cpp最新版本: $LATEST_VERSION"

        # 定义需要下载的架构列表
        ARCHITECTURES=("arm64-v8a" "armeabi-v7a" "x86_64")

        # 循环下载每个架构的库文件
        for ARCH in "${ARCHITECTURES[@]}"; do
          echo "正在下载 $ARCH 架构的libllama.so..."
          DOWNLOAD_URL="https://github.com/ggml-org/llama.cpp/releases/download/${LATEST_VERSION}/llama-${LATEST_VERSION}-android-${ARCH}.tar.xz"

          # 下载并解压
          if curl -L --retry 3 --retry-delay 2 -o "llama-${ARCH}.tar.xz" "$DOWNLOAD_URL"; then
            echo "下载成功，正在解压..."
            tar -xf "llama-${ARCH}.tar.xz"
            
            # 复制libllama.so到正确目录
            if [ -f "libllama.so" ]; then
              cp libllama.so "app/src/main/jniLibs/${ARCH}/"
              echo "✅ $ARCH 架构安装成功"
            else
              echo "❌ 错误：解压后未找到libllama.so"
              exit 1
            fi
            
            # 清理临时文件
            rm -f "llama-${ARCH}.tar.xz" libllama.so
          else
            echo "❌ 错误：无法下载 $ARCH 架构文件"
            echo "下载链接: $DOWNLOAD_URL"
            exit 1
          fi
        done

        echo "所有架构的libllama.so下载完成"

    - name: Generate Gradle Wrapper
      run: gradle wrapper

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LocalAI-Chat-Android-debug
        path: app/build/outputs/apk/debug/app-debug.apk

