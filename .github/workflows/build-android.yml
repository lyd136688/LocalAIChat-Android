name: Build Android APK (Auto Download libllama.so)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 自动下载最新版llama.cpp arm64-v8a库
      - name: Download libllama.so (arm64-v8a)
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          wget -O llama-android.zip https://github.com/ggerganov/llama.cpp/releases/latest/download/llama-b3888-android-arm64-v8a.zip
          unzip -j llama-android.zip libllama.so -d app/src/main/jniLibs/arm64-v8a/
          rm llama-android.zip

      # 自动生成gradlew并赋予执行权限（修复核心错误）
      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

